<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #f9c74f, #f3722c, #f94144, #90be6d, #43aa8b, #577590, #a8dadc);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: rainbow 4s ease infinite;
      text-shadow: none;
    }

    p {
      margin-top: 1.2rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    button {
      margin-top: 2.5rem;
      padding: 0.8rem 2.4rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      background: linear-gradient(135deg, #f9c74f, #f3722c);
      color: #fff;
      box-shadow: 0 4px 24px rgba(249, 199, 79, 0.35);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 8px 32px rgba(249, 199, 79, 0.5);
    }

    button:active {
      transform: scale(0.97);
    }

    @keyframes rainbow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="content">
    <h1>Hello, World!</h1>
    <p>Welcome to something wonderful</p>
    <button id="btn">More confetti!</button>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    const COLORS = [
      '#f9c74f', '#f3722c', '#f94144', '#90be6d',
      '#43aa8b', '#577590', '#a8dadc', '#e9c46a',
      '#ff6b6b', '#c77dff', '#48cae4'
    ];

    class Particle {
      constructor(x, y) {
        this.x = x ?? Math.random() * canvas.width;
        this.y = y ?? -10;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.size = Math.random() * 8 + 4;
        this.speedX = (Math.random() - 0.5) * 6;
        this.speedY = Math.random() * 4 + 2;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.2;
        this.shape = Math.random() < 0.5 ? 'rect' : 'circle';
        this.opacity = 1;
        this.decay = Math.random() * 0.008 + 0.004;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.1 + 0.05;
      }

      update() {
        this.wobble += this.wobbleSpeed;
        this.x += this.speedX + Math.sin(this.wobble) * 1.2;
        this.y += this.speedY;
        this.rotation += this.rotationSpeed;
        this.opacity -= this.decay;
        this.speedY += 0.05; // gravity
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);
        ctx.fillStyle = this.color;

        if (this.shape === 'rect') {
          ctx.fillRect(-this.size / 2, -this.size / 4, this.size, this.size / 2);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.restore();
      }

      isDead() {
        return this.opacity <= 0 || this.y > canvas.height + 20;
      }
    }

    let particles = [];

    function burst(x, y, count = 80) {
      for (let i = 0; i < count; i++) {
        const p = new Particle(x, y);
        p.speedX = (Math.random() - 0.5) * 14;
        p.speedY = (Math.random() - 1.5) * 10;
        p.decay = Math.random() * 0.012 + 0.005;
        particles.push(p);
      }
    }

    function rain(count = 6) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      rain();
      particles = particles.filter(p => !p.isDead());
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    // Initial burst from center
    setTimeout(() => {
      burst(canvas.width / 2, canvas.height / 2, 150);
    }, 200);

    document.getElementById('btn').addEventListener('click', () => {
      burst(canvas.width / 2, canvas.height * 0.55, 180);
    });

    animate();
  </script>
</body>
</html>
