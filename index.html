<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ff6fd8, #3813c2, #00d2ff, #f7971e);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      filter: drop-shadow(0 0 30px rgba(255, 111, 216, 0.4));
    }

    p {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    button {
      margin-top: 2.5rem;
      padding: 0.8rem 2.4rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #fff;
      background: transparent;
      border: 2px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.5);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.97);
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="content">
    <h1>Hello, World!</h1>
    <p>Welcome to the party</p>
    <button id="btn">More confetti</button>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');

    let W, H;
    const particles = [];

    const COLORS = [
      '#ff6fd8', '#3813c2', '#00d2ff', '#f7971e',
      '#ff4757', '#2ed573', '#ffa502', '#eccc68',
      '#a29bfe', '#fd79a8', '#00cec9', '#fdcb6e',
    ];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(x, y, burst) {
        this.x = x ?? Math.random() * W;
        this.y = y ?? -10;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.w = 8 + Math.random() * 10;
        this.h = 4 + Math.random() * 6;
        this.vx = (Math.random() - 0.5) * (burst ? 14 : 3);
        this.vy = burst ? (Math.random() * -14 - 4) : (2 + Math.random() * 4);
        this.gravity = 0.25;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.25;
        this.opacity = 1;
        this.fade = burst ? 0.012 : 0.007;
      }

      update() {
        this.vx *= 0.99;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.spin;
        this.opacity -= this.fade;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.rect(-this.w / 2, -this.h / 2, this.w, this.h);
        ctx.fill();
        ctx.restore();
      }

      isDead() {
        return this.opacity <= 0 || this.y > H + 20;
      }
    }

    function spawnRain(count = 6) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function burst(x, y, count = 120) {
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, true));
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      spawnRain();

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].isDead()) particles.splice(i, 1);
      }

      requestAnimationFrame(loop);
    }

    // Initial burst from center
    window.addEventListener('load', () => {
      resize();
      burst(W / 2, H / 2, 160);
      loop();
    });

    window.addEventListener('resize', resize);

    // Click anywhere for burst
    document.addEventListener('click', (e) => {
      if (e.target.id !== 'btn') burst(e.clientX, e.clientY, 100);
    });

    document.getElementById('btn').addEventListener('click', (e) => {
      e.stopPropagation();
      burst(W / 2, H / 2, 200);
    });
  </script>
</body>
</html>
