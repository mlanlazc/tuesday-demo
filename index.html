<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ff6ec7, #ffbe00, #00e5ff, #a259ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
    }

    p {
      margin-top: 1rem;
      font-size: 1.25rem;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    button {
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      color: #0f0f1a;
      background: linear-gradient(135deg, #ff6ec7, #ffbe00);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 0 24px rgba(255, 110, 199, 0.4);
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(255, 110, 199, 0.6);
    }

    button:active {
      transform: scale(0.97);
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="hero">
    <h1>Hello, World!</h1>
    <p>Welcome to something beautiful</p>
    <button onclick="burst()">Celebrate again</button>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let W, H, particles = [];

    const COLORS = [
      '#ff6ec7', '#ffbe00', '#00e5ff', '#a259ff',
      '#ff4d4d', '#00ff9f', '#ff9a3c', '#4dffdb'
    ];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
      constructor(x, y) {
        this.x = x ?? Math.random() * W;
        this.y = y ?? -10;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.w = 8 + Math.random() * 10;
        this.h = 4 + Math.random() * 6;
        this.vx = (Math.random() - 0.5) * 6;
        this.vy = 2 + Math.random() * 5;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.3;
        this.gravity = 0.08 + Math.random() * 0.06;
        this.drag = 0.98;
        this.alpha = 1;
        this.fade = 0.004 + Math.random() * 0.006;
        this.shape = Math.random() < 0.4 ? 'circle' : 'rect';
      }

      update() {
        this.vy += this.gravity;
        this.vx *= this.drag;
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.spin;
        if (this.y > H * 0.6) this.alpha -= this.fade;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.alpha);
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        ctx.fillStyle = this.color;

        if (this.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, this.w / 2, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillRect(-this.w / 2, -this.h / 2, this.w, this.h);
        }

        ctx.restore();
      }

      isDead() { return this.alpha <= 0 || this.y > H + 20; }
    }

    function spawnBurst(cx, cy, count = 120) {
      for (let i = 0; i < count; i++) {
        const p = new Particle(cx, cy);
        const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
        const speed = 4 + Math.random() * 10;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed - 6;
        p.gravity = 0.2 + Math.random() * 0.15;
        p.fade = 0.008 + Math.random() * 0.008;
        particles.push(p);
      }
    }

    function spawnRain(count = 80) {
      for (let i = 0; i < count; i++) {
        setTimeout(() => particles.push(new Particle()), i * 20);
      }
    }

    function burst() {
      spawnBurst(W / 2, H / 2, 180);
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      particles = particles.filter(p => !p.isDead());
      particles.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(loop);
    }

    // Initial celebration on load
    loop();
    spawnBurst(W / 2, H / 2, 160);
    setTimeout(() => spawnRain(100), 600);
  </script>
</body>
</html>
