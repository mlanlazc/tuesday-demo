<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello World!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(90deg, #f72585, #7209b7, #3a0ca3, #4361ee, #4cc9f0);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 4s ease infinite;
      filter: drop-shadow(0 0 30px rgba(76, 201, 240, 0.4));
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      text-transform: uppercase;
      animation: fadeIn 1s ease forwards;
    }

    .hint {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.25);
      letter-spacing: 2px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.25; }
      50%       { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>
  <div class="content">
    <h1>Hello, World!</h1>
    <p class="subtitle">Welcome to the party</p>
    <p class="hint">click anywhere for more confetti</p>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');

    let W, H;
    const particles = [];

    const COLORS = [
      '#f72585', '#b5179e', '#7209b7', '#560bad',
      '#480ca8', '#3a0ca3', '#3f37c9', '#4361ee',
      '#4895ef', '#4cc9f0', '#06d6a0', '#ffd166'
    ];

    const SHAPES = ['circle', 'square', 'ribbon'];

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }

    class Particle {
      constructor(x, y, burst = false) {
        this.x = x ?? Math.random() * W;
        this.y = y ?? -10;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
        this.size = Math.random() * 8 + 4;
        this.speedX = (Math.random() - 0.5) * (burst ? 12 : 4);
        this.speedY = Math.random() * (burst ? 10 : 4) + (burst ? -8 : 2);
        this.gravity = 0.25;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (Math.random() - 0.5) * 0.2;
        this.opacity = 1;
        this.fade = Math.random() * 0.005 + 0.008;
        this.burst = burst;
      }

      update() {
        this.x += this.speedX;
        this.speedY += this.gravity;
        this.y += this.speedY;
        this.rotation += this.rotSpeed;
        if (this.y > H * 0.7) this.opacity -= this.fade * 3;
        else if (this.burst) this.opacity -= this.fade;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.rotation);

        if (this.shape === 'circle') {
          ctx.beginPath();
          ctx.arc(0, 0, this.size / 2, 0, Math.PI * 2);
          ctx.fill();
        } else if (this.shape === 'square') {
          ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
        } else {
          ctx.fillRect(-this.size / 2, -this.size / 5, this.size, this.size / 2.5);
        }

        ctx.restore();
      }

      isDead() {
        return this.opacity <= 0 || this.y > H + 20;
      }
    }

    function spawnRain() {
      if (particles.length < 300) {
        for (let i = 0; i < 3; i++) {
          particles.push(new Particle());
        }
      }
    }

    function burst(x, y) {
      for (let i = 0; i < 80; i++) {
        particles.push(new Particle(x, y, true));
      }
    }

    function loop() {
      ctx.clearRect(0, 0, W, H);
      spawnRain();

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].isDead()) particles.splice(i, 1);
      }

      requestAnimationFrame(loop);
    }

    // Initial burst from center
    window.addEventListener('load', () => {
      resize();
      burst(W / 2, H / 2);
      loop();
    });

    window.addEventListener('resize', resize);

    document.addEventListener('click', (e) => burst(e.clientX, e.clientY));
  </script>
</body>
</html>
