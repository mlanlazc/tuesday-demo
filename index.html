<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello World</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .hero {
      text-align: center;
      z-index: 10;
      position: relative;
    }

    h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: pulse 3s ease-in-out infinite;
      text-shadow: none;
      line-height: 1.1;
    }

    .subtitle {
      margin-top: 1rem;
      font-size: clamp(1rem, 3vw, 1.5rem);
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      text-transform: uppercase;
      font-weight: 300;
    }

    .btn {
      margin-top: 2.5rem;
      display: inline-block;
      padding: 0.85rem 2.5rem;
      border: none;
      border-radius: 50px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
    }

    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 14px 40px rgba(102, 126, 234, 0.55);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="hero">
    <h1>Hello, World!</h1>
    <p class="subtitle">Welcome to the party</p>
    <button class="btn" onclick="burst()">Celebrate!</button>
  </div>

  <script>
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animFrame;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const COLORS = [
      '#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3',
      '#54a0ff', '#5f27cd', '#00d2d3', '#1dd1a1',
      '#ff9f43', '#c8d6e5'
    ];

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
        this.size = Math.random() * 8 + 4;
        this.vx = (Math.random() - 0.5) * 14;
        this.vy = Math.random() * -18 - 6;
        this.gravity = 0.55;
        this.friction = 0.99;
        this.opacity = 1;
        this.decay = Math.random() * 0.012 + 0.007;
        this.angle = Math.random() * Math.PI * 2;
        this.spin = (Math.random() - 0.5) * 0.25;
        this.shape = Math.random() < 0.5 ? 'rect' : 'circle';
        this.aspect = Math.random() * 0.6 + 0.4;
      }

      update() {
        this.vy += this.gravity;
        this.vx *= this.friction;
        this.x += this.vx;
        this.y += this.vy;
        this.angle += this.spin;
        this.opacity -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = Math.max(0, this.opacity);
        ctx.fillStyle = this.color;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        if (this.shape === 'rect') {
          ctx.fillRect(-this.size / 2, -this.size * this.aspect / 2, this.size, this.size * this.aspect);
        } else {
          ctx.beginPath();
          ctx.ellipse(0, 0, this.size / 2, this.size * this.aspect / 2, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }
    }

    function burst(x, y) {
      const cx = x ?? canvas.width / 2;
      const cy = y ?? canvas.height * 0.45;
      for (let i = 0; i < 180; i++) {
        particles.push(new Particle(cx, cy));
      }
      if (!animFrame) loop();
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles = particles.filter(p => p.opacity > 0 && p.y < canvas.height + 50);
      particles.forEach(p => { p.update(); p.draw(); });
      if (particles.length > 0) {
        animFrame = requestAnimationFrame(loop);
      } else {
        animFrame = null;
      }
    }

    // Auto-burst on load
    window.addEventListener('load', () => {
      setTimeout(() => burst(), 300);
    });

    // Click anywhere to burst
    document.addEventListener('click', e => {
      if (!e.target.classList.contains('btn')) {
        burst(e.clientX, e.clientY);
      }
    });
  </script>
</body>
</html>
